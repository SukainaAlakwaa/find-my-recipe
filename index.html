<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FindMyRecipe</title>
  <link rel="stylesheet" href="css/index.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
  <link href="https://fonts.cdnfonts.com/css/glacial-indifference-2" rel="stylesheet">
</head>
<body>
  <header class="navbar">
    <div class="logo">Find<span class="highlight">My</span>Recipe</div>

        <div class="search-wrapper">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="search" autocomplete="off" />
            <button id="searchBtn" type="button">
            <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>

        <div id="suggestionsBox" class="suggestions-box"></div>
        </div>

    <div class="nav-icons">
      <a href="pages/addnew.html"><i class="fa-regular fa-square-plus"></i></a>
      <a href="pages/profile.html"><i class="fa-solid fa-user"></i></a>
      <a href="pages/settings.html"><i class="fa-solid fa-gear"></i></a>
    </div>
  </header>

  <main>
    <section class="hero" id="hero">
      <div class="hero-overlay">
        <h1>Find<span class="highlight">My</span>Recipe</h1>
        <p>Search, save, and create your own recipes all in one place</p>
        <p>Don’t know what to cook? We got you.</p>
        <a href="#recipes" class="hero-btn">Find Recipes</a>
      </div>
    </section>

    <section class="recipes-section" id="recipes">
      <div class="recipes-container" id="recipesContainer"></div>
    </section>
  </main>

  <footer class="footer">
  <div class="footer-left">
    <p>@2026 FindMyRecipe All Rights Reserved</p>
  </div>

  <div class="footer-right-group">
    <div class="footer-middle">
      <h4>HELP & SUPPORT</h4>
      <a href="settings.html" class="footer-link">Go to Support</a>
    </div>

    <div class="footer-right">
      <h4>FIND US ON</h4>
      <div class="social-icons">
        <i class="fa-brands fa-facebook-f"></i>
        <i class="fa-brands fa-tiktok"></i>
        <i class="fa-brands fa-instagram"></i>
      </div>
    </div>
  </div>
</footer>

  <script src="../js/theme.js"></script>
  <script src="js/api.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
