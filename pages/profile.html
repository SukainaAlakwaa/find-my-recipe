<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile Page</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/nav.css">
  <link rel="stylesheet" href="../css/footer.css">
  <link rel="stylesheet" href="../css/profile.css" />

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.cdnfonts.com/css/glacial-indifference-2" rel="stylesheet">

</head>
<body>

  <!-- TOP NAV -->
  <div data-include="header-simple"></div>

  <!-- Profile Header -->
  <section class="profile-header">

    <!-- LEFT: AVATAR -->
    <div class="profile-left">
      <img src="noodles.png" alt="Profile picture" class="profile-pic" id="profileAvatar" />
    </div>

    <!-- CENTER: NAME + TABS -->
    <div class="profile-center">
      <div class="username-row">
        <h1 id="profileUsername">Cozy Noodles</h1>
        <a href="settings.html" class="settings-btn" aria-label="Settings">
          <span class="material-symbols-outlined">settings</span>
        </a>
      </div>

      <div class="profile-tabs">
        <a href="#" class="tab-link active" data-tab="saved">Saved Recipes</a>
        <a href="#" class="tab-link" data-tab="collections">Collections</a>
        <a href="#" class="tab-link" data-tab="favorites">Favorites</a>
      </div>
    </div>

    <!-- RIGHT: CREATE BUTTON -->
    <div class="profile-right">
      <a href="addnew.html" class="create-btn">Create</a>
    </div>

  </section>

  <!-- MAIN CONTENT -->
  <main class="content">

    <!-- TOP TITLE -->
    <div class="content-top">
      <h2 id="sectionTitle">Saved Recipes</h2>
    </div>

    <!-- COLLECTIONS PANEL -->
    <section id="collectionsPanel" class="collections-panel hidden">
      <div class="collection-form">
        <input type="text" id="collectionNameInput" placeholder="Enter collection name" />
        <button id="addCollectionBtn">Add Collection</button>
      </div>
    </section>

    <!-- COLLECTIONS EDITOR -->
    <section id="collectionEditor" class="collection-editor hidden">
      <h3>Edit Collection</h3>

      <input type="text" id="editCollectionName" placeholder="Collection name" />

      <div class="editor-actions">
        <button id="saveCollectionEditBtn">Save</button>
        <button id="deleteCollectionBtn">Delete</button>
        <button id="closeCollectionEditorBtn" type="button">Close</button>
      </div>

      <div id="collectionRecipesList"></div>
    </section>    

    <!-- RECIPES / COLLECTIONS OUTPUT -->
    <section id="profileOutput" class="recipe-grid"></section>

    <!-- Collection popup -->
    <div id="collectionPopup" class="collection-popup hidden">
      <div class="collection-popup-box">
        <h3>Select Collection</h3>
        <div id="collectionPopupList"></div>
        <button id="closeCollectionPopupBtn" type="button">Close</button>
      </div>
    </div>

  </main>

  <div data-include="footer"></div>

  <script src="../js/includes.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/nav.js"></script>
  <script src="../js/profile.js"></script>
</body>
</html>
