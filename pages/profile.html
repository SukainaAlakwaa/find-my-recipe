<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile Page</title>
  <link rel="stylesheet" href="../css/profile.css" />

  <!-- Google Icons for the settings gear -->
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
  />
</head>
<body>

  <!-- TOP NAV -->
  <header class="navbar">
    <div class="logo">Find<span class="highlight">My</span>Recipe</div>

    <div class="nav-icons">
      <a href="pages/addnew.html"><i class="fa-regular fa-square-plus"></i></a>
      <a href="pages/profile.html"><i class="fa-solid fa-user"></i></a>
      <a href="pages/settings.html"><i class="fa-solid fa-gear"></i></a>
    </div>
  </header>


  <!-- PROFILE HEADER -->
  <section class="profile-header">
    <div class="profile-left">
      <img src="noodles.png" alt="Profile picture" class="profile-pic" />
    </div>

    <div class="profile-center">
      <div class="username-row">
        <h1>Cozy Noodles</h1>
        <a href="#" class="settings-btn" aria-label="Settings">
          <span class="material-symbols-outlined">settings</span>
        </a>
      </div>

      <div class="profile-tabs">
        <a href="#">SAVED RECIPES</a>
        <a href="#">COLLECTIONS</a>
        <a href="#">FAVORITES</a>
      </div>
    </div>

    <div class="profile-right">
      <a href="#" class="create-btn">Create</a>
    </div>
  </section>

  <!-- CONTENT -->
  <main class="content">
    <div class="content-top">
      <h2>102 SAVED RECIPES</h2>

      <div class="controls">
        <button class="control-btn">
          <span class="icon">☰</span>
          <span>SORT</span>
        </button>

        <button class="control-btn">
          <span class="icon">⌯</span>
          <span>FILTER</span>
        </button>
      </div>
    </div>

    <!-- Footer -->
     <footer class="footer">
    <div class="footer-left">
      <p>@2026 FindMyRecipe All Rights Reserved</p>
    </div>

    <div class="footer-middle">
      <h4>CONTACT US</h4>
      <p>info@findmyrecipe.com</p>
    </div>

    <div class="footer-right">
      <h4>FIND US ON</h4>
      <div class="social-icons">
        <i class="fa-brands fa-facebook-f"></i>
        <i class="fa-brands fa-tiktok"></i>
        <i class="fa-brands fa-instagram"></i>
      </div>
    </div>
  </footer>

</body>
</html>
