<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Add New Recipe</title>
        <link rel="stylesheet" href="../css/addnew.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
        <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/glacial-indifference-2">
        <link href="https://fonts.cdnfonts.com/css/glacial-indifference-2" rel="stylesheet">
    </head>

    <body>

    <div data-include="header-simple"></div>

        <div class="container">
        <!-- PROFILE HEADER -->
            <div class="profile-header">

                <!-- PROFILE INFO -->
                <div class="profile-left">
                    <div id="currentProfile"></div>
                </div>

            </div>

            <!-- GRID -->
            <div class="grid">

                <!-- RECIPE IMAGE -->
                <div class="card image-upload">
                    <input type="file" id="imageInput" hidden>

                    <label for="imageInput" id="imageLabel">
                        <i class="fa-solid fa-upload"></i>
                        <span>Upload image here</span>
                    </label>

                    <div class="image-preview-wrapper">
                        <img id="preview" />
                        <button class="edit-btn"><i class="fa-solid fa-pencil"></i></button>
                    </div>
                </div>

                <!-- RECIPE TITLE -->
                <div class="card title input-control">
                    <h1>Title</h1>
                    <input type="text" class="input-field" maxlength="50" placeholder="Add recipe title">
                    <div class="error-message"></div>
                </div>

                <!-- RECIPE CATEGORY -->
                <div class="card small input-control">
                    <h1>Category</h1>
                    <input type="text" class="input-field" maxlength="20" placeholder="Ex: Chicken, Beef">
                    <div class="error-message"></div>
                </div>

                <!-- RECIPE AREA -->
                <div class="card small input-control">
                    <h1>Area</h1>
                    <input type="text" class="input-field" maxlength="20" placeholder="Ex: Italian, Mexican">
                    <div class="error-message"></div>
                </div>

                <!-- RECIPE INGREDIENTS -->
                <div class="card ingredients input-control">
                    <h1>Ingredients</h1>
                    <ul class="ingredients-list" contenteditable="true">
                        <li></li>
                    </ul>
                    <div class="error-message"></div>
                </div>

                <!-- RECIPE DIRECTION -->
                <div class="card directions input-control">
                    <h1>Directions</h1>
                    <textarea class="input-field" placeholder="Add directions"></textarea>
                    <div class="error-message"></div>
                </div>

                <!-- CREATE RECIPE -->
                <div class="create">
                    <button class="create-btn">Create</button>
                </div>
            </div>
        </div>

        <script src="../js/includes.js"></script>
        <script src="../js/nav.js"></script>
        <script src="../js/addnew.js"></script>
    </body>
</html>
