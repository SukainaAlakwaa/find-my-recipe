<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add New Recipe</title>
<link rel="stylesheet" href="../css/popup.css">

</head>
<body>

<div class="container">

    <div class="top-bar">
        <div class="back">←</div>
        <button class="post-btn">Post</button>
    </div>

    <div class="profile-row">
        <div class="pfp">pfp</div>
        <div class="nickname">nickname</div>
    </div>

    <div class="grid">

        <div class="card image-upload">
            Upload image here
        </div>

        <div class="card title">
            <h4>Title</h4>
            <div class="placeholder">Add recipe title</div>
        </div>

        <div class="card small">
            <h4>Cooking Time</h4>
            <div class="placeholder">00:00:00 min</div>
        </div>

        <div class="card small">
            <h4>Serves</h4>
            <div class="placeholder">__ People</div>
        </div>

        <div class="card ingredients">
            <h4>Ingredients</h4>
            <div class="placeholder">• Add Ingredients</div>
        </div>

        <div class="card directions">
            <h4>Directions</h4>
            <div class="placeholder">1. Add directions</div>
        </div>

        <div class="card description">
            <h4>Description</h4>
            <div class="placeholder">Add description</div>
        </div>

    </div>

</div>

</body>
</html>
