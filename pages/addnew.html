<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add New Recipe</title>
<link rel="stylesheet" href="../css/popup.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="https://fonts.cdnfonts.com/css/glacial-indifference-2">
<script src="../js/addnew.js" defer></script>
<link href="https://fonts.cdnfonts.com/css/glacial-indifference-2" rel="stylesheet">


</head>
<body>

  <header class="navbar">
    <div class="logo">Find<span class="highlight">My</span>Recipe</div>

        <div class="search-wrapper">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="search" autocomplete="off" />
            <button id="searchBtn" type="button">
            <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>

        <div id="suggestionsBox" class="suggestions-box"></div>
        </div>

    <div class="nav-icons">
      <a href="../pages/addnew.html"><i class="fa-regular fa-square-plus"></i></a>
      <a href="../pages/profile.html"><i class="fa-solid fa-user"></i></a>
      <a href="../pages/settings.html"><i class="fa-solid fa-gear"></i></a>
    </div>
  </header>

<div class="container">

    <div class="grid">
<!-- img upload, need to add upload icon later -->
        <div class="card image-upload">
            <input type="file" id="imageInput" hidden>
            <label for="imageInput" id="imageLabel">
                <i class="fa-solid fa-upload"></i>
                <span>Upload image here</span>
            </label>            
            <img id="preview" />
        </div>

        <div class="card title">
            <h1>Title</h1>
            <div class="placeholder" contenteditable="true" data-placeholder="Add recipe title"></div>
        </div>

        <!-- <div class="card description">
            <h1>Description</h1>
            <div class="placeholder" contenteditable="true" data-placeholder="Add description"></div>
        </div> -->

        <div class="card small">
            <h1>Category</h1>
            <div class="placeholder" contenteditable="true" data-placeholder="Ex: Chicken, Beef"></div> 
        </div>

        <div class="card small">
            <h1>Area</h1>
            <div class="placeholder" contenteditable="true" data-placeholder="Ex: Italian, Mexican"></div>
        </div>

        <div class="card ingredients">
            <h1>Ingredients</h1>
            <div class="placeholder" contenteditable="true" data-placeholder="• Add ingredients"></div>
        </div>

        <div class="card directions">
            <h1>Directions</h1>
            <div class="placeholder" contenteditable="true" data-placeholder="Add directions"></div>
        </div>

        <div class="post">
            <!-- <div class="pfp">pfp</div>
            <div class="nickname">nickname</div> -->
            <button class="post-btn">Post</button>
        </div>



    </div>

</div>

</body>
</html>
