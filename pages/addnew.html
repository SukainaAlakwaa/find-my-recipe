<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add New Recipe</title>
<link rel="stylesheet" href="../css/popup.css">

</head>
<body>

<div class="container">

    <div class="top-bar">
        <div class="back">←</div>
        <button class="post-btn">Post</button>
    </div>

    <div class="profile-row">
        <div class="pfp">pfp</div>
        <div class="nickname">nickname</div>
    </div>

    <div class="grid">
<!-- img upload, need to add upload icon later -->
        <div class="card image-upload">
            <input type="file" id="imageInput" hidden>
            <label for="imageInput" id="imageLabel">Upload image here</label>
            <img id="preview" />
        </div>

        <div class="card title">
            <h1>Title</h1>
            <div class="placeholder" contenteditable="true" data-placeholder="Add recipe title"></div>
        </div>

        <div class="card small">
            <h1>Cooking Time</h1>
            <!-- vvv figure out how to make this turn into hours and minutes later vvv -->
            <input type="number" placeholder="Minutes"> 
        </div>

        <div class="card small">
            <h1>Serves</h1>
            <div class="placeholder" contenteditable="true" data-placeholder="Number of people"></div>
        </div>

        <div class="card ingredients">
            <h1>Ingredients</h1>
            <div class="placeholder" contenteditable="true" data-placeholder="• Add ingredients"></div>
        </div>

        <div class="card directions">
            <h1>Directions</h1>
            <div class="placeholder" contenteditable="true" data-placeholder="1. Add directions"></div>
        </div>

        <div class="card description">
            <h1>Description</h1>
            <div class="placeholder" contenteditable="true" data-placeholder="Add description"></div>
        </div>

    </div>

</div>

</body>
</html>
